<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Child Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-purple-500 to-pink-500 min-h-screen p-6">

    <!-- Navigation Bar -->
    <nav class="flex justify-between items-center bg-white shadow-lg p-4 rounded-xl">
        <h1 class="text-2xl font-bold text-purple-700">🔍 Find</h1>
        <div class="space-x-4">
            <a href="report.html" class="px-4 py-2 bg-gradient-to-r from-blue-400 to-blue-600 text-white font-semibold rounded-lg shadow-md hover:from-blue-500 hover:to-blue-700">Report</a>
            <button class="px-4 py-2 bg-gradient-to-r from-green-400 to-green-600 text-white font-semibold rounded-lg shadow-md hover:from-green-500 hover:to-green-700">Search</button>
            <button class="px-4 py-2 bg-gradient-to-r from-red-400 to-red-600 text-white font-semibold rounded-lg shadow-md hover:from-red-500 hover:to-red-700">Sign Up</button>
        </div>
    </nav>
    <!-- Search Bar -->
    <div class="mt-6 flex justify-center">
        <input type="text" placeholder="🔎 Search for missing children..." 
            class="w-full max-w-lg p-3 text-lg border border-gray-300 rounded-xl shadow-md focus:outline-none focus:ring-4 focus:ring-purple-400">
    </div>
    
    <!-- Reports Section -->
    <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- Lost Child Card 1 -->
        <div class="bg-white p-5 rounded-lg shadow-xl text-center">
            <img src="https://via.placeholder.com/150" alt="Lost Child" class="w-32 h-32 mx-auto rounded-full border-4 border-purple-500">
            <h2 class="text-xl font-bold text-gray-800 mt-4">Pranav</h2>
            <p class="text-gray-600">📍 Location: Vellore</p>
            <p class="text-gray-600">🧑‍🤝‍🧑 Found by: Ajitesh</p>
            <p class="text-gray-600">📞 Phone: 9948382341</p>
        </div>

    


    </div>

</body>
</html>
